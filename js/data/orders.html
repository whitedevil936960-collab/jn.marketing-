<!DOCTYPE html>
<html>
<head>
<title>Orders</title>
<script src="js/main.js"></script>
</head>
<body>

<h2>Place Order</h2>

Customer: <input id="cust"><br>
Rate: <input id="rate" type="number"><br>
Qty: <input id="qty" type="number"><br>
<button onclick="placeOrder()">Submit</button>

<script>
function placeOrder(){

let user = getUser();

let cust = document.getElementById("cust").value;
let rate = +document.getElementById("rate").value;
let qty = +document.getElementById("qty").value;
let total = rate * qty;

let orders = JSON.parse(localStorage.getItem("orders") || "[]");

orders.push({
customer:cust,
rate:rate,
qty:qty,
total:total,
orderBy:user.name,
date:new Date().toLocaleDateString(),
time:new Date().toLocaleTimeString()
});

localStorage.setItem("orders", JSON.stringify(orders));

alert("Order Saved. Total = " + total);
}
</script>

</body>
</html>
